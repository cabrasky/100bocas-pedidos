<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4c3a"/>
      <stop offset="50%" stop-color="#1a7a5e"/>
      <stop offset="100%" stop-color="#2d6a9f"/>
    </linearGradient>
  </defs>
  <!-- Fondo rounded -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Plato/círculo interior -->
  <circle cx="256" cy="256" r="160" fill="rgba(255,255,255,.08)"/>
  <!-- Tenedor (izquierda) -->
  <g transform="translate(256,256)">
    <!-- Mango tenedor -->
    <rect x="-72" y="30" width="28" height="100" rx="6" fill="#fbbf24" transform="rotate(-20)"/>
    <!-- Dientes tenedor -->
    <rect x="-80" y="-60" width="6" height="50" rx="3" fill="#fbbf24" transform="rotate(-20)"/>
    <rect x="-70" y="-65" width="6" height="55" rx="3" fill="#fbbf24" transform="rotate(-20)"/>
    <rect x="-60" y="-60" width="6" height="50" rx="3" fill="#fbbf24" transform="rotate(-20)"/>
    <!-- Cuchillo (derecha) -->
    <rect x="36" y="25" width="24" height="105" rx="6" fill="#fbbf24" transform="rotate(20)"/>
    <rect x="36" y="-80" width="24" height="60" rx="10" fill="#fbbf24" transform="rotate(20)"/>
    <!-- Puntos decorativos -->
    <circle cx="0" cy="120" r="6" fill="rgba(255,255,255,.3)"/>
    <circle cx="0" cy="145" r="4" fill="rgba(255,255,255,.2)"/>
  </g>
</svg>
