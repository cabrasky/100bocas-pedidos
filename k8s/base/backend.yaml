apiVersion: apps/v1
kind: Deployment
metadata:
  name: bocas-backend
  namespace: bocas
  labels:
    app: bocas-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bocas-backend
  template:
    metadata:
      labels:
        app: bocas-backend
    spec:
      initContainers:
      - name: wait-for-db
        image: postgres:16-alpine
        command:
        - sh
        - -c
        - |
          echo "Waiting for database to be ready..."
          until pg_isready -h bocas-db -U bocas -d 100bocas; do
            sleep 2
          done
          echo "Database is ready!"
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: bocas-secrets
              key: POSTGRES_PASSWORD
      containers:
      - name: backend
        image: PLACEHOLDER_BACKEND
        ports:
        - containerPort: 8112
        env:
        - name: BOCAS_DB
          valueFrom:
            secretKeyRef:
              name: bocas-secrets
              key: BOCAS_DB
        - name: BOCAS_HOST
          value: "0.0.0.0"
        - name: BOCAS_PORT
          value: "8112"
        - name: BOCAS_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bocas-secrets
              key: BOCAS_ADMIN_PASSWORD
        - name: BOCAS_TRUSTED_PROXIES
          value: "10.0.0.0/8, 192.168.0.0/16"
        - name: SSR_URL
          value: "http://bocas-frontend:8120"
        envFrom:
        - secretRef:
            name: bocas-secrets
            optional: true
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /api/sessions
            port: 8112
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/sessions
            port: 8112
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: bocas-backend
  namespace: bocas
  labels:
    app: bocas-backend
spec:
  selector:
    app: bocas-backend
  ports:
  - port: 8112
    targetPort: 8112
