apiVersion: apps/v1
kind: Deployment
metadata:
  name: bocas-frontend
  namespace: bocas
  labels:
    app: bocas-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bocas-frontend
  template:
    metadata:
      labels:
        app: bocas-frontend
    spec:
      # Evacuate pods quickly when a node goes offline (default is 300s)
      tolerations:
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 30
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 30
      # Spread replicas across different nodes for resilience
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: bocas-frontend
      initContainers:
      - name: wait-for-backend
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Waiting for backend to be ready..."
          until wget -qO- http://bocas-backend:8112/api/sessions >/dev/null 2>&1; do
            sleep 2
          done
          echo "Backend is ready!"
      containers:
      - name: frontend
        image: PLACEHOLDER_FRONTEND
        imagePullPolicy: Always
        ports:
        - containerPort: 8120
        env:
        - name: SSR_PORT
          value: "8120"
        - name: FASTAPI_URL
          value: "http://bocas-backend:8112"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 8120
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8120
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: bocas-frontend
  namespace: bocas
  labels:
    app: bocas-frontend
spec:
  selector:
    app: bocas-frontend
  ports:
  - port: 8120
    targetPort: 8120
