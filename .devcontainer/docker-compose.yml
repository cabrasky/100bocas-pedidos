version: '3.8'

services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    environment:
      - BOCAS_DB=${BOCAS_DB:-postgresql://bocas:bocas_pass@db:5432/100bocas}
      - BOCAS_HOST=${BOCAS_HOST:-0.0.0.0}
      - BOCAS_PORT=${BOCAS_PORT:-8112}
    ports:
      - "${PROXY_PORT:-80}:80"
      - "${BACKEND_PORT:-8112}:8112"
      - "${FRONTEND_PORT:-8113}:8113"
    depends_on:
      - db
    command: sleep infinity

  db:
    image: postgres:${POSTGRES_VERSION:-16}
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-100bocas}
      - POSTGRES_USER=${DB_USER:-bocas}
      - POSTGRES_PASSWORD=${DB_PASS:-bocas_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"

volumes:
  postgres_data:
