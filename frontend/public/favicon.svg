<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="50%" stop-color="#C62828"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <!-- Fondo rounded -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Círculo interior sutil -->
  <circle cx="256" cy="256" r="160" fill="rgba(255,255,255,.08)"/>
  <!-- "100" grande centrado -->
  <text x="256" y="270" font-family="Arial,Helvetica,sans-serif" font-size="140" font-weight="900" fill="#FFD700" text-anchor="middle" dominant-baseline="central">100</text>
  <!-- Tenedor (izquierda) -->
  <g transform="translate(256,256)">
    <rect x="-200" y="30" width="22" height="90" rx="5" fill="#FFD700" transform="rotate(-20)"/>
    <rect x="-206" y="-60" width="5" height="50" rx="2" fill="#FFD700" transform="rotate(-20)"/>
    <rect x="-198" y="-65" width="5" height="55" rx="2" fill="#FFD700" transform="rotate(-20)"/>
    <rect x="-190" y="-60" width="5" height="50" rx="2" fill="#FFD700" transform="rotate(-20)"/>
    <!-- Cuchillo (derecha) -->
    <rect x="170" y="25" width="20" height="95" rx="5" fill="#FFD700" transform="rotate(20)"/>
    <rect x="170" y="-70" width="20" height="55" rx="8" fill="#FFD700" transform="rotate(20)"/>
  </g>
</svg>
